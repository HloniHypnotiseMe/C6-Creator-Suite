<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=C6Creatorsuite-saved.html">
    <title>C6 Creator Suite</title>
    <style>
        body {
            background: #0F172A;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
        }
        .loader {
            text-align: center;
            color: #94A3B8;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8B5CF6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #06B6D4;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        window.location.href = "C6Creatorsuite-saved.html";
    </script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Loading C6 Creator Suite...</p>
        <p style="font-size: 12px; margin-top: 16px;">If nothing happens, <a href="C6Creatorsuite-saved.html">click here</a></p>
    </div>
</body>
</html>
